<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixas</title>
    <style>
        body{
            background-color: rgb(125, 125, 125);
        }
        h1.primeiro{
            margin: 70px;
            padding: 10px;
            color: aqua;
            border-color:yellow blue red green;
            border-style:double;
            text-align: center;
            border-width: 10px;
        }
        h1.segundo{
            margin: 50px;
            padding: 10px;
            text-align: center;
            color: darkblue;
            border-style: dashed;
            border-width:15px;
            border-color: darkgreen;
        }
        h1.terceiro{
            margin: 30px;
            padding: 10px;
            text-align: center;
            color: rgb(0, 255, 128);
            border-style: groove;
            border-width: 13px;
            border-color: deeppink;
        }
    </style>
</head>
<body>
  <h1 class="primeiro">Borda 1</h1>
  <h1 class="segundo">Borda 2</h1>
  <h1 class="terceiro">Borda 3</h1>
</body>
</html>
