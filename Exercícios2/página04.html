<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        /*
        
        #  - id
        .  - class
        :  - pseudo-classes
        :: - pseudo elementos
        >  - children
        
        */
        body{
            background-color: rgb(132, 132, 132);
        }
        a{
            text-decoration: none;
            color: yellow;
        }
        a:visited{
            color: rgb(13, 255, 0);
        }
        a:hover{
            text-decoration: underline;
        }
        a:active{
            color: aqua;
        }
        .especial::before{
            content:'<';
            text-decoration: none;
            font-weight: normal;
            color: black;
        }
        .especial::after{
            content:'>';
            text-decoration: none;
            font-weight: normal;
            color: black;
        }
    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <p>Para aprender HTML5 e CSS3,acesse o <a href="https://github.com/gustavoguanabara">O Git Hub do Guanabara</a></p>
        <p>Se quiser conhecer mais sobre os padrões,visite o site do <a href="https://www.w3c.br/">Escritório do W3C no Brasil</a></p>
        <p>Para acompanhar os cursos,acesse o <a href="https://www.youtube.com/@CursoemVideo" class="especial">Canal do CursoemVídeo</a></p>
    </ul>
</body>
</html>
