<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face{
            font-family:'Technology' ;
            src:url('fontes/Perfect Futures.ttf')format('truetype');
            /*Tipos de format()
            -oppentype(otf)
            -truetype(ttf)
            -embedded-oppentype
            -truetype-aat(Aple Advanced Typography)
            -svg
            */
            font-weight: normal;
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        h1{
            font-family: 'Technology','Times New Roman', Times, serif;
            font-size: 3em;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. A, hic iste molestias officia deserunt repellendus sed voluptates placeat, consequuntur unde eaque perspiciatis architecto possimus. Quasi molestias quas animi dicta repellendus.</p>
</body>
</html>
