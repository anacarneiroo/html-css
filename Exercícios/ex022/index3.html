<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posição da imagem de fundo</title>
    <style>
        div.bloco{
            border: 2px;
            border-color: black;
            border-style: solid;
            height: 200px;
            margin: 10px;
            border-radius: 10px;
            background-image: url('imagens/imagens/wallpaper002.jpg');
            
        }

        div#b1{
            background-position: right center;
        }

        div#b2{
            background-position: left bottom;
        }
        
        div#b3{
            background-position: left top;
        }

        div#b4{
            background-position: center ;
        }
    </style>
</head>
<body>
    <div class="bloco" id="b1"></div>
    <div class="bloco" id="b2"></div>
    <div class="bloco" id="b3"></div>
    <div class="bloco" id="b4"></div>
</body>
</html>
