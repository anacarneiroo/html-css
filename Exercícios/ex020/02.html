<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando os conhecimentos</title>
    <style>
        body{background-color: rgb(123, 124, 124);}
        p:hover{
            color: yellow;
        }
        div>p{
            display: none;
        }

        div:hover > p{
            display: block;
            color: yellow;
        }
    </style>
</head>
<body>
    <h1>Hover</h1>
    <h2>Link</h2>
    <p>Clique para aparecer o link</p>
    <div>
        <p><a href="https://youtu.be/nyuo9-OjNNg">vídeo</a></p>
    </div>
    </p>
</body>
</html>
