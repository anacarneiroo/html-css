<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudoclasses</title>
    <style>
        div{
            height:200px;
            width: 200px;
            text-align: center;
            display: inline-block;
            background-color: rgb(110, 74, 74);
            border: 1px solid black;
            display: inline-block;
        }
        div:hover{
            background-color: yellow;
        }
    </style>
</head>
<body>
    <div id="01">01</div>
    <div id="02">02</div>
    <div id="03">03</div>

    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Quos, dicta provident repudiandae aspernatur sequi incidunt cupiditate animi molestias natus similique dolores hic quae itaque fugiat eius iste sit veritatis. Fugit.</p>
    
</body>
</html>
