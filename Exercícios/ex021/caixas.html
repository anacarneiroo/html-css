<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1{
            text-align: center;
            height: 300px;
            width: 300px;
            background-color: bisque;

            border-color: darkgoldenrod;
            border-width: 10px;
            border-style: double;
            
            padding-top: 10px;
            padding-left: 10px;
            padding-right:10px;
            padding-bottom: 10px;

            margin: auto;
            margin-top: 100px;
            margin-bottom: 100px;

            outline-color: black;
            outline-width: 20px;
            outline-style: dashed;

        }

        a{
            border-width: 10px;
            border-style: groove;
            border-color: coral;

            padding-top: 10px;
            padding-left: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level,mas os <a href="#">links são exemplos de caixas inline-level</a>Vamos ver como tudoo funciona</p>
</body>
</html>
